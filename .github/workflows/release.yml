# Manual signed release workflow.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   - base64-encoded hoverclock-keystore.jks (base64 -i hoverclock-keystore.jks | pbcopy)
#   ANDROID_KEYSTORE_PASSWORD - keystore storePassword
#   ANDROID_KEY_ALIAS         - key alias
#   ANDROID_KEY_PASSWORD      - key password
#
# GITHUB_TOKEN is provided automatically for publishing releases.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

#      - name: Unit tests
#        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Prepare signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > hoverclock-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=hoverclock-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        id: apk
        run: |
          VERSION_NAME=$(jq -r '.elements[0].versionName' app/build/outputs/apk/release/output-metadata.json)
          APK_NAME="HoverClock-v${VERSION_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.apk.outputs.version_name }}
          name: HoverClock v${{ steps.apk.outputs.version_name }}
          body: |
            Automated release build.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          generate_release_notes: false
          files: ${{ steps.apk.outputs.apk_name }}
